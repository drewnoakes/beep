name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.x'
  CONFIGURATION: Release
  VERSION: ${{ github.event.release.tag_name }}

jobs:
  pack-pointer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet pack -c ${{ env.CONFIGURATION }} -p:Version=${{ env.VERSION }} --output ./nupkgs
      - uses: actions/upload-artifact@v7
        with:
          name: package-pointer
          path: nupkgs/*.nupkg

  pack-any:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet pack -r any -c ${{ env.CONFIGURATION }} -p:PublishAot=false -p:Version=${{ env.VERSION }} --output ./nupkgs
      - uses: actions/upload-artifact@v7
        with:
          name: package-any
          path: nupkgs/*.nupkg

  pack-windows:
    strategy:
      matrix:
        rid: [win-x64, win-arm64]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet pack -r ${{ matrix.rid }} -c ${{ env.CONFIGURATION }} -p:Version=${{ env.VERSION }} --output ./nupkgs
      - uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.rid }}
          path: nupkgs/*.nupkg

  pack-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: sudo apt-get install -y clang zlib1g-dev
      - run: dotnet pack -r ${{ matrix.rid }} -c ${{ env.CONFIGURATION }} -p:Version=${{ env.VERSION }} --output ./nupkgs
      - uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.rid }}
          path: nupkgs/*.nupkg

  pack-macos:
    strategy:
      matrix:
        rid: [osx-x64, osx-arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet pack -r ${{ matrix.rid }} -c ${{ env.CONFIGURATION }} -p:Version=${{ env.VERSION }} --output ./nupkgs
      - uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.rid }}
          path: nupkgs/*.nupkg

  publish:
    needs: [pack-pointer, pack-any, pack-windows, pack-linux, pack-macos]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/download-artifact@v8
        with:
          path: packages
          pattern: package-*
          merge-multiple: true
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Push RID-specific and 'any' packages
        run: |
          for pkg in packages/Beep.[a-z]*.nupkg; do
            dotnet nuget push "$pkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
          done
      - name: Push pointer package
        run: |
          for pkg in packages/Beep.[0-9]*.nupkg; do
            dotnet nuget push "$pkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
          done
